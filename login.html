<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diskuti | Login</title>
</head>
<body>
  <main>
    <div>
      <!--Image-->
      <section>
        <img src="resources/banner.png" alt="Account Creation and Login pages' banner image">
        <h2>Quizz - Discuss - Connect</h2>
      </section>

      <!--Login Form-->
      <section>
        <div>
          <img src="resources/logo.png" alt="Diskuti's Logo">
          <h1>Welcome Back</h1>
          <h3>Jump back into the discussion!</h3>
        </div>
        <div>
          <form action="#">
            <input type="email" name="email" id="email" placeholder="Email">
            <input type="password" name="password" id="password" placeholder="Password">
            <input type="button" name="login" id="login" value="Log In">
          </form>
          <div></div> <!--A linha que tem de separação-->
          <span>Don't have an account? <a href="account-creation.html">Sign Up</a></span>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
