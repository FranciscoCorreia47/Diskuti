<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="./styles/login.css">
    <title>Diskuti - Create Account</title>
</head>
<body>
    <main>
        <section class="banner">
            <div class="banner-title">
                <h2>Quiz - Discuss - Connect</h2>
            </div>
            <img src="./resources/banner-img.png" alt="">
        </section>
        
        <section class="form-area">
            <div class="logo">
                <img src="./resources/logo.png" alt="">
            </div>
            <div class="form-title">
                <h1>Create an Acount</h1>
            </div>
            <div class="login-page-link">
                <p>Already have an account? <a href="./login.html" class="link">Log In</a></p>
            </div>
            <form action="" class="form">
                <div class="full-name">
                    <input type="text" name="first-name" id="first-name">
                    <input type="text" name="last-name" id="last-name">
                </div>
                <input type="text" name="email" id="email">
                <input type="text" name="password" id="password">
                <input type="button" name="send-btn" id="send-btn" value="Create Account">
            </form>
        </section>
    </main>
</body>
</html>
